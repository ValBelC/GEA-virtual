<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Juegos</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    .section {
        flex: 1;
        border: 1px solid black;
        padding: 10px;
        overflow: auto;
    }

    h2 {
        text-align: center;
    }

    /* Timer */
    .timer {
        text-align: center;
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: bold;
    }

    /* Cartas */
    .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    .card {
        width: 60px;
        height: 80px;
        background: lightblue;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        cursor: grab;
        border-radius: 5px;
    }

    /* Letras */
    .letters {
        font-size: 24px;
        text-align: center;
        margin: 10px;
    }

    input {
        width: 80%;
        padding: 5px;
        font-size: 16px;
    }

    button {
        margin-top: 5px;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Juego 1 -->
    <div class="section">
        <h2>Ordena las fracciones</h2>
        <div class="timer" id="timer1">Tiempo: 60</div>
        <div id="cards" class="cards"></div>
        <button onclick="checkOrder()">Verificar</button>
        <p id="result1"></p>
    </div>

    <!-- Juego 2 -->
    <div class="section">
        <h2>Forma palabras</h2>
        <div class="timer" id="timer2">Tiempo: 60</div>
        <div id="letters" class="letters"></div>
        <input type="text" id="wordInput" placeholder="Escribe palabra">
        <button onclick="addWord()">Agregar</button>
        <ul id="wordList"></ul>
    </div>

    <!-- Juego 3 -->
    <div class="section">
        <h2>Próximamente...</h2>
    </div>

</div>

<script>
/* ================= TIMER ================= */

let time1 = 60;
let time2 = 60;

let interval1 = setInterval(() => {
    time1--;
    document.getElementById("timer1").innerText = "Tiempo: " + time1;

    if (time1 <= 0) {
        clearInterval(interval1);
        document.getElementById("result1").innerText = "⏰ Tiempo agotado";
    }
}, 1000);

let interval2 = setInterval(() => {
    time2--;
    document.getElementById("timer2").innerText = "Tiempo: " + time2;

    if (time2 <= 0) {
        clearInterval(interval2);
        alert("⏰ Tiempo agotado en palabras");
    }
}, 1000);

/* ===== JUEGO 1: FRACCIONES ===== */

let fractions = [
    "1/2", "1/3", "2/3", "1/4",
    "3/4", "1/5", "2/5", "3/5",
    "4/5", "5/6", "1/6", "1/1"
];

// Mezclar
fractions.sort(() => Math.random() - 0.5);

const cardsContainer = document.getElementById("cards");

fractions.forEach(frac => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = frac;
    div.draggable = true;

    div.addEventListener("dragstart", dragStart);
    div.addEventListener("dragover", dragOver);
    div.addEventListener("drop", drop);

    cardsContainer.appendChild(div);
});

let dragged;

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    e.preventDefault();
    if (e.target.classList.contains("card")) {
        let temp = dragged.innerText;
        dragged.innerText = e.target.innerText;
        e.target.innerText = temp;
    }
}

function fracToDecimal(frac) {
    let [num, den] = frac.split("/").map(Number);
    return num / den;
}

function checkOrder() {
    const cards = document.querySelectorAll(".card");
    let correct = true;

    for (let i = 0; i < cards.length - 1; i++) {
        let current = fracToDecimal(cards[i].innerText);
        let next = fracToDecimal(cards[i + 1].innerText);

        if (current > next) {
            correct = false;
            break;
        }
    }

    document.getElementById("result1").innerText =
        correct ? "✅ Correcto!" : "❌ Intenta otra vez";
}

/* ===== JUEGO 2: PALABRAS OFFLINE ===== */

// Letras disponibles
const letters = ["A", "E", "O", "S", "R", "T"];
document.getElementById("letters").innerText = letters.join(" ");

// Diccionario offline
const dictionary = [
    "SER", "SET", "TESO", "RETO", "ROTA", "ARTE",
    "TESAR", "RESTA", "ESTAR", "SORTEA", "TASER"
];

function addWord() {
    if (time2 <= 0) return;

    const input = document.getElementById("wordInput");
    const word = input.value.toUpperCase();

    if (!word) return;

    let validLetters = word.split("").every(letter => letters.includes(letter));

    if (!validLetters) {
        alert("Usa solo las letras dadas");
        return;
    }

    if (!dictionary.includes(word)) {
        alert("Esa palabra no existe ❌");
        return;
    }

    const li = document.createElement("li");
    li.innerText = word;
    document.getElementById("wordList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
